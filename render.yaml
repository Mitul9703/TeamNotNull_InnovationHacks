services:
  - type: web
    name: pitchmirror-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SIMLI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SIMLI_FACE_IDS
        sync: false
